services:
  backend:
    # 构建 FastAPI 后端镜像，便于后续部署到 Railway 或其他容器平台。
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fina-backend
    restart: unless-stopped
    depends_on:
      # 等待 PostgreSQL 健康后再启动后端，避免容器刚启动时连库失败。
      postgres:
        condition: service_healthy
      memory_postgres:
        condition: service_healthy
    env_file:
      # 从项目根目录 .env 中读取环境变量。
      - .env
    environment:
      # 显式给出关键默认值，避免本地 .env 忘记同步时，
      # 容器里缺少记忆数据库或导出目录配置。
      DATABASE_URL: ${DATABASE_URL:-postgresql://fina:fina123@postgres:5432/fina}
      MEMORY_DATABASE_URL: ${MEMORY_DATABASE_URL:-postgresql://fina_memory:fina_memory123@memory_postgres:5432/fina_memory}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_ALLOWED_MODELS: ${AI_ALLOWED_MODELS:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_too}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      EXPORTS_DIR: ${EXPORTS_DIR:-/app/exports}
    ports:
      # 将容器内 8000 端口映射到宿主机 8000。
      - "8000:8000"
    volumes:
      # 将导出目录映射到宿主机，方便直接获取 Excel 和 Word 报告文件。
      - ./exports:/app/exports

  postgres:
    # 使用官方 PostgreSQL 15 镜像，满足你指定的数据库版本要求。
    image: postgres:15
    # 为容器指定固定名称，便于后续通过 docker ps / docker logs 快速定位。
    container_name: fina-postgres
    restart: unless-stopped
    environment:
      # 初始化数据库名称；首次创建数据目录时会自动生成该数据库。
      POSTGRES_DB: fina
      # 初始化数据库用户名。
      POSTGRES_USER: fina
      # 初始化数据库密码。
      POSTGRES_PASSWORD: fina123
    ports:
      # 将容器内 PostgreSQL 默认端口映射到宿主机 5432，方便本机后端直接连接。
      - "5432:5432"
    volumes:
      # 使用命名卷持久化 PostgreSQL 数据。
      # 即使删除容器，只要不删除这个卷，数据库数据就会保留。
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # 使用 pg_isready 检查数据库是否已经可以接收连接。
      test: ["CMD-SHELL", "pg_isready -U fina -d fina"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memory_postgres:
    # 独立的记忆数据库，专门存放对话与长期记忆。
    image: postgres:15
    container_name: fina-memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fina_memory
      POSTGRES_USER: fina_memory
      POSTGRES_PASSWORD: fina_memory123
    ports:
      # 为了避免和主库冲突，映射到宿主机 5433。
      - "5433:5432"
    volumes:
      # 记忆数据库单独持久化，便于单独备份与迁移。
      - memory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fina_memory -d fina_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  # 定义命名卷，供上面的 postgres 服务复用，保证数据持久化。
  postgres_data:
  memory_postgres_data:
